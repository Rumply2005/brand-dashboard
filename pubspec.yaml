name: brand_dashboard
description: Dashboard de Costos y Margen de Ganancia.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0' 
  
dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.2.1

  # Profile customization
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2

  # Animations        ← agrega aquí
  animate_do: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true